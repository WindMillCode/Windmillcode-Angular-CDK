<div (click)="toggle()" [class]="classPrefix('MainPod') +params.container.class">

  <input [checked]="params.thumb.value"  [class]="classPrefix('MainInput0')" type="checkbox">
  <div [class]="classPrefix('MainItem0') + params.container.class">
    <div [class]="classPrefix('MainItem1') +classPrefix('MainEffect0') "></div>
    <p [class]="classPrefix('MainText0') + classPrefix('MainEffect0')" >{{$any(params.toggleText.text) | translate}}</p>
  </div>
  <div [class]="classPrefix('MainItem0') +classPrefix('MainItem0Dummy')">
    <div [class]="classPrefix('MainItem1') + params.thumb.class"></div>
    <p [class]="classPrefix('MainText0')  + params.toggleText.class" [ngStyle]="params.toggleText.style">{{$any(params.toggleText.text) | translate}}</p>
  </div>

</div>
